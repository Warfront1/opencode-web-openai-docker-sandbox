services:
  nginx-api-gateway:
    image: nginx:alpine
    container_name: nginx-api-gateway
    environment:
      - OPENAI_API_KEY=${CUSTOM_API_KEY:?error}
      - OPENAI_API_BASE=${CUSTOM_API_BASE:?error}
    volumes:
      - ./config/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "4096:4096"
    networks:
      - opencode_isolated
      - internet_access

  opencode-app:
    image: ghcr.io/anomalyco/opencode
    container_name: opencode-app
    depends_on:
      - nginx-api-gateway
    environment:
      - OPENAI_API_KEY=SANDBOX_MANAGED
      - OPENCODE_CONFIG=/tmp/opencode.json
      - CUSTOM_MODELS=${CUSTOM_MODELS:-}
    volumes:
      - ${PROJECT_DIR:?error}:/workspace
    working_dir: /workspace
    networks:
      - opencode_isolated
    command:
      - /bin/sh
      - -c
      - |
        # Generate opencode.json with dynamic models
        MODELS_JSON="{}"
        if [ -n "$$CUSTOM_MODELS" ]; then
          MODELS_JSON=""
          for m in $$(echo $$CUSTOM_MODELS | tr ',' ' '); do
            MODELS_JSON="$$MODELS_JSON \"$$m\": { \"name\": \"$$m\" },"
          done
          MODELS_JSON="{ $${MODELS_JSON%,} }"
        fi

        cat <<EOF > /tmp/opencode.json
        {
          "\$schema": "https://opencode.ai/config.json",
          "provider": {
            "my-openai-compatible-provider": {
              "npm": "@ai-sdk/openai-compatible",
              "name": "My OpenAI-Compatible Provider",
              "options": {
                "baseURL": "http://nginx-api-gateway/api/v1"
              },
              "models": $$MODELS_JSON
            }
          }
        }
        EOF

        exec opencode web --port 4096 --hostname 0.0.0.0
    stdin_open: true
    tty: true

networks:
  opencode_isolated:
    internal: true
  internet_access:
    internal: false
