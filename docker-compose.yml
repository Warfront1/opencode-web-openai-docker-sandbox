services:
  nginx-api-gateway:
    image: nginx:alpine
    container_name: nginx-api-gateway
    environment:
      - OPENAI_API_KEY=${CUSTOM_API_KEY:?error}
      - OPENAI_API_BASE=${CUSTOM_API_BASE:?error}
    volumes:
      - ./config/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "4096:4096"
    networks:
      - opencode_isolated
      - internet_access

  opencode-app:
    image: ghcr.io/anomalyco/opencode
    container_name: opencode-app
    depends_on:
      - nginx-api-gateway
    environment:
      - OPENAI_API_KEY=SANDBOX_MANAGED
      - OPENCODE_CONFIG=/tmp/opencode.json
      - CUSTOM_MODELS=${CUSTOM_MODELS:-}
    volumes:
      - ${PROJECT_DIR:?error}:/workspace
      - ./config/opencode/entrypoint.sh:/entrypoint.sh:ro
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - opencode_isolated
      - internet_access
    stdin_open: true
    tty: true

networks:
  opencode_isolated:
    internal: true
  internet_access:
    internal: false
